enableImmutableInstalls: false
nodeLinker: node-modules

# 限制 yarn 只拉取 linux x64 平台变体
# 原因：sharp 默认会拉 4 个平台包（@img/sharp-{linux,darwin,win32}-{x64,arm64}），
# EdgeOne 构建容器磁盘小（~1-2GB），3 个 Windows 变体 + arm64 变体浪费 ~200MB，
# 导致 yarn install 在 extract 阶段 ENOSPC。
# 注意：这是 yarn 2+ / Yarn Berry 格式；yarn 1.x 需配 .yarnrc（无扩展）
supportedArchitectures:
  os:
    - linux
  cpu:
    - x64
  libc:
    - glibc
    - musl
