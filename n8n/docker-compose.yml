services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    # Redirect api.notion.com to a Cloudflare Worker reverse-proxy
    # (bypasses GFW RST on VPS→Notion direct path).
    # The IPs below are Cloudflare edge nodes for notion-proxy.faiz-world.com.
    # If proxy moves, run `getent ahosts notion-proxy.faiz-world.com` to refresh.
    extra_hosts:
      - "api.notion.com:104.21.29.141"
      - "api.notion.com:172.67.149.65"
    environment:
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=https://${N8N_HOST}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Trust nginx reverse proxy (forward X-Forwarded-For)
      - TRUST_PROXY=true
      # Sentry (optional — leave empty to disable)
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:

# Note: removed Redis + EXECUTIONS_MODE=queue.
# Single instance is enough for current traffic (< 100 orders/day).
# To scale out, add a worker container and switch to queue mode.
